# Dokploy / GitHub deployment
# - Set env vars in Dokploy UI (Environment tab) or via .env
# - Add domain in Dokploy Domains tab for HTTPS (routes to port 8080)
# - P2P port 3000 must stay exposed for validator peers

services:
  bery:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_RPC_URL: ${VITE_RPC_URL:-}
    ports:
      - "8080:8080"
      - "3000:3000"
    expose:
      - 8080
    volumes:
      - bery-data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - P2P_PORT=3000
      - API_PORT=8080
      - LISTEN_ADDRESS=0.0.0.0
      - PRIVATE_KEY=${PRIVATE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - BOOTSTRAP_PEERS=${BOOTSTRAP_PEERS:-}
      - FAUCET_ENABLED=${FAUCET_ENABLED:-false}
      - FAUCET_TOKEN=${FAUCET_TOKEN:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - DATABASE_URL=${DATABASE_URL:-}
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  bery-data:

networks:
  dokploy-network:
    external: true
